<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M3 Messenger</title>
    <style>
        :root {
            --m3-surface: #fef7ff;
            --m3-primary: #6750a4;
            --m3-primary-light: #eaddff;
            --m3-outline: #79747e;
        }

        body { 
            margin: 0; font-family: 'Roboto', sans-serif; 
            background: var(--m3-surface); height: 100vh;
            display: flex; flex-direction: column;
        }

        header { padding: 16px; font-size: 22px; font-weight: 500; border-bottom: 1px solid #e0e0e0; display: flex; justify-content: space-between; }

        #chat { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }

        /* Стили пузырей */
        .msg { 
            padding: 10px 16px; border-radius: 20px; max-width: 75%; 
            position: relative; line-height: 1.4;
        }
        .msg.other { align-self: flex-start; background: var(--m3-primary-light); color: #21005d; border-bottom-left-radius: 4px; }
        .msg.me { align-self: flex-end; background: var(--m3-primary); color: white; border-bottom-right-radius: 4px; }
        
        .author { font-size: 11px; font-weight: bold; margin-bottom: 4px; opacity: 0.7; }

        .input-box { padding: 16px; display: flex; gap: 8px; background: white; border-top: 1px solid #eee; }
        input { flex: 1; border: 1px solid var(--m3-outline); padding: 12px 20px; border-radius: 28px; outline: none; }
        button { background: var(--m3-primary); color: white; border: none; padding: 0 24px; border-radius: 28px; cursor: pointer; font-weight: 500; }

        /* Окно "регистрации" */
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 100; }
        .modal { background: white; padding: 24px; border-radius: 28px; width: 80%; max-width: 300px; text-align: center; }
    </style>
</head>
<body>

<div id="overlay">
    <div class="modal">
        <h3>Как тебя зовут?</h3>
        <input type="text" id="userName" placeholder="Твой ник">
        <button style="margin-top:16px; width:100%; height:48px" onclick="saveName()">Войти</button>
    </div>
</div>

<header>
    <span>M3 Messenger</span>
    <span id="myNick" style="font-size: 14px; opacity: 0.6;"></span>
</header>

<div id="chat"></div>

<div class="input-box">
    <input type="text" id="m" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') send()">
    <button onclick="send()">Отправить</button>
</div>

<script>
    const URL = 'https://vxmyecxwbmkzhdvstmkj.supabase.co/rest/v1/messages';
    const KEY = 'sb_publishable_ZK43win9MDcyJPlU5o6iZA_ODCQLmve';
    let myName = localStorage.getItem('chat_name');

    if(myName) {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('myNick').innerText = myName;
    }

    function saveName() {
        const n = document.getElementById('userName').value;
        if(!n) return;
        localStorage.setItem('chat_name', n);
        location.reload();
    }

    const headers = { "apikey": KEY, "Authorization": `Bearer ${KEY}`, "Content-Type": "application/json" };

    async function load() {
        const res = await fetch(`${URL}?select=*&order=created_at.asc`, { headers });
        const data = await res.json();
        if (!Array.isArray(data)) return;

        document.getElementById('chat').innerHTML = data.map(m => `
            <div class="msg ${m.author === myName ? 'me' : 'other'}">
                <div class="author">${m.author}</div>
                ${m.text}
            </div>
        `).join('');
        
        const chat = document.getElementById('chat');
        chat.scrollTop = chat.scrollHeight;
    }

    async function send() {
        const i = document.getElementById('m');
        if (!i.value) return;
        
        await fetch(URL, {
            method: 'POST',
            headers,
            body: JSON.stringify({ text: i.value, author: myName })
        });
        i.value = '';
        load();
    }

    setInterval(load, 2000);
    load();
</script>

</body>
</html>
