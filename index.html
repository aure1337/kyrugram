<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KyruGram</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --tg-bg: #17212b; --tg-sidebar: #0e1621; --tg-active: #2b5278;
            --tg-text: #f5f5f5; --tg-hint: #708499; --tg-msg-out: #2b5278; --tg-msg-in: #182533;
        }
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--tg-bg); color: var(--tg-text); height: 100vh; display: flex; overflow: hidden; }

        /* Боковая панель */
        .sidebar { width: 300px; background: var(--tg-sidebar); border-right: 1px solid #000; display: flex; flex-direction: column; }
        .search-area { padding: 15px; }
        .search-area input { width: 100%; padding: 8px; border-radius: 5px; border: none; background: #242f3d; color: white; outline: none; }
        
        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item { padding: 12px 15px; display: flex; align-items: center; cursor: pointer; border-bottom: 1px solid #101921; }
        .chat-item:hover { background: #1c2938; }
        .chat-item.active { background: var(--tg-active); }
        .avatar { width: 45px; height: 45px; border-radius: 50%; background: #517da2; margin-right: 12px; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        /* Основной чат */
        .main-chat { flex: 1; display: flex; flex-direction: column; background: #0e1621; }
        .chat-header { padding: 10px 20px; background: var(--tg-sidebar); display: flex; flex-direction: column; }
        .status { font-size: 13px; color: var(--tg-hint); }

        #chat-window { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-size: contain; }
        
        .bubble { padding: 8px 14px; border-radius: 12px; max-width: 60%; font-size: 15px; position: relative; }
        .bubble.me { align-self: flex-end; background: var(--tg-msg-out); border-bottom-right-radius: 2px; }
        .bubble.other { align-self: flex-start; background: var(--tg-msg-in); border-bottom-left-radius: 2px; }

        .input-area { padding: 15px; background: var(--tg-sidebar); display: flex; gap: 10px; }
        .input-area input { flex: 1; background: transparent; border: none; color: white; outline: none; font-size: 16px; }

        /* Слой авторизации */
        #auth-layer { position: fixed; inset: 0; background: var(--tg-bg); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: var(--tg-sidebar); padding: 30px; border-radius: 10px; width: 320px; text-align: center; }
        .auth-card input { width: 100%; margin: 10px 0; padding: 10px; background: #242f3d; border: none; color: white; border-radius: 5px; }
        .auth-card button { width: 100%; padding: 10px; background: #517da2; border: none; color: white; border-radius: 5px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div id="auth-layer">
    <div class="auth-card">
        <h2>KyruGram</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="text" id="username" placeholder="@username">
        <input type="password" id="pass" placeholder="Пароль">
        <button onclick="auth('up')">Регистрация</button>
        <button onclick="auth('in')" style="background: transparent; border: 1px solid #517da2;">Войти</button>
    </div>
</div>

<div class="sidebar">
    <div class="search-area">
        <input type="text" id="searchUser" placeholder="Поиск по @username или +7..." onkeypress="if(event.key==='Enter') searchContact()">
    </div>
    <div class="chat-list" id="chatList">
        </div>
</div>

<div class="main-chat">
    <div class="chat-header">
        <b id="chatName">Выберите чат</b>
        <span class="status" id="chatStatus"></span>
    </div>
    <div id="chat-window"></div>
    <div class="input-area">
        <input type="text" id="msgInp" placeholder="Написать сообщение..." onkeypress="if(event.key==='Enter') send()">
        <button onclick="send()" style="background:none; border:none; color:#517da2; font-weight:bold; cursor:pointer;">ОТПРАВИТЬ</button>
    </div>
</div>

<script>
    const client = supabase.createClient('https://vxmyecxwbmkzhdvstmkj.supabase.co', 'sb_publishable_ZK43win9MDcyJPlU5o6iZA_ODCQLmve');
    
    let myUser = null; 
    let activeChat = null;

    async function auth(type) {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        const nick = document.getElementById('username').value.replace('@', '');

        const { data, error } = type === 'up' 
            ? await client.auth.signUp({ email, password: pass, options: { data: { username: nick } } })
            : await client.auth.signInWithPassword({ email, password: pass });

        if (error) return alert(error.message);
        
        if (type === 'up') {
            await client.from('profiles').insert([{ id: data.user.id, username: nick }]);
        }
        location.reload();
    }

    async function init() {
        const { data: { user } } = await client.auth.getUser();
        if (user) {
            myUser = user;
            document.getElementById('auth-layer').style.display = 'none';
            // Обновляем статус "в сети"
            updateOnlineStatus();
            loadHistory();
        }
    }

    async function searchContact() {
        const query = document.getElementById('searchUser').value.replace('@', '');
        const { data } = await client.from('profiles').select('*').or(`username.eq.${query},phone.eq.${query}`).single();
        
        if (data) {
            openChat(data.username, data);
        } else {
            alert('Пользователь не найден');
        }
    }

    function openChat(username, profile) {
        activeChat = username;
        document.getElementById('chatName').innerText = username;
        formatStatus(profile);
        loadMsgs();
    }

    function formatStatus(p) {
        const el = document.getElementById('chatStatus');
        if (p.is_private) {
            el.innerText = 'был(а) недавно';
            return;
        }
        // Логика времени (упрощенно)
        const last = new Date(p.last_seen);
        const now = new Date();
        if (now - last < 60000) el.innerText = 'в сети';
        else el.innerText = `был(а) в ${last.toLocaleTimeString()}`;
    }

    async function loadMsgs() {
        if (!activeChat) return;
        const { data } = await client.from('private_messages')
            .select('*')
            .or(`and(sender_user.eq.${myUser.user_metadata.username},receiver_user.eq.${activeChat}),and(sender_user.eq.${activeChat},receiver_user.eq.${myUser.user_metadata.username})`)
            .order('created_at', { ascending: true });

        document.getElementById('chat-window').innerHTML = data.map(m => `
            <div class="bubble ${m.sender_user === myUser.user_metadata.username ? 'me' : 'other'}">
                ${m.text}
            </div>
        `).join('');
        const win = document.getElementById('chat-window');
        win.scrollTop = win.scrollHeight;
    }

    async function send() {
        const txt = document.getElementById('msgInp').value;
        if (!txt || !activeChat) return;
        await client.from('private_messages').insert([{
            text: txt,
            sender_user: myUser.user_metadata.username,
            receiver_user: activeChat
        }]);
        document.getElementById('msgInp').value = '';
        loadMsgs();
    }

    async function updateOnlineStatus() {
        await client.from('profiles').update({ last_seen: new Date() }).eq('id', myUser.id);
    }

    setInterval(loadMsgs, 2000);
    init();
</script>
</body>
</html>
